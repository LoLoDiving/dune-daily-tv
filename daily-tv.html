<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>DAILY PACKAGES – TV</title>

<style>
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6f8;
  color:#111;
}

#root{
  height:100vh;
}

/* GRID */
.desktop-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  padding:8px;
  height:100%;
  box-sizing:border-box;
}

.day-column{
  display:flex;
  flex-direction:column;
  min-height:0;
}

.day-title{
  margin:0;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  color:#0b4f6c;
}

.day-content{
  padding:6px;
  overflow:auto;
}

/* SLOT */
.slot-header{
  background:#0b4f6c;
  color:#fff;
  padding:6px 8px;
  margin-top:6px;
  border-radius:8px;
  font-weight:900;
}

.slot-content{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-top:4px;
}

/* PAX */
.pax{
  padding:4px 6px;
  background:#fff;
  border-radius:6px;
}

.pax-name{
  font-weight:800;
}

.pax-equip{
  font-size:12px;
  opacity:.7;
}

/* LOADER */
#loadingOverlay{
  position:fixed;
  inset:0;
  background:#f4f6f8;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(0,0,0,.1);
  border-top-color:#0b4f6c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.loader-text{
  margin-top:10px;
  font-weight:800;
}

/* DEBUG */
.debug{
  position:fixed;
  top:10px;
  left:10px;
  background:red;
  color:#fff;
  padding:6px 10px;
  font-weight:900;
  z-index:9999;
}
</style>
</head>

<body>

<div class="debug">TV VERSION</div>

<div id="loadingOverlay">
  <div>
    <div class="spinner"></div>
    <div class="loader-text">Loading daily packages…</div>
  </div>
</div>

<div id="root"></div>

<script>

/* =========================
   CONFIG API
========================= */
const API = "https://script.google.com/macros/s/AKfycbxf4qR_wub5P5N3bnLlqu-y6hYiJExeRvoH4OtaisuLo9t4P2lmVoZjhMhRqGGpJG9NPA/exec";

/* =========================
   STATE
========================= */
let currentDate = new Date();
let isLoading = false;

/* =========================
   HELPERS
========================= */
function toISO(d){
  return d.toISOString().slice(0,10);
}

function formatDate(d){
  return d.toLocaleDateString("en-GB",{
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* =========================
   FETCH
========================= */
async function fetchDaily(dateISO){
  try{
    const res = await fetch(API + "?page=DATA_DAILY_PACKAGES&date=" + dateISO + "&t=" + Date.now());
    return await res.json();
  }catch(e){
    console.error(e);
    return null;
  }
}

/* =========================
   LOAD
========================= */
async function load(){

  if(isLoading) return;
  isLoading = true;

  const base = new Date(currentDate);

  const d0 = toISO(base);

  const d1Date = new Date(base);
  d1Date.setDate(base.getDate()+1);
  const d1 = toISO(d1Date);

  const [dataJ, dataJ1] = await Promise.all([
    fetchDaily(d0),
    fetchDaily(d1)
  ]);

  if(!dataJ || !dataJ1){
    console.error("NO DATA");
    return;
  }

  render(dataJ, dataJ1);

  document.getElementById("loadingOverlay").style.display = "none";

  isLoading = false;
}

/* =========================
   RENDER
========================= */
function render(dataJ, dataJ1){

  const root = document.getElementById("root");

  root.innerHTML = `
    <div class="desktop-grid">

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ.date))}</h2>
        <div id="contentJ"></div>
      </div>

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ1.date))}</h2>
        <div id="contentJ1"></div>
      </div>

    </div>
  `;

  renderDay("contentJ", dataJ);
  renderDay("contentJ1", dataJ1);
}

/* =========================
   RENDER DAY
========================= */
function renderDay(id, data){

  const el = document.getElementById(id);

  let html = "";

  ["MORNING-1","MORNING-2","AFTERNOON"].forEach(slot => {

    if(!data.slots?.[slot]) return;

    html += `<div class="slot-header">${slot}</div>`;
    html += `<div class="slot-content">`;

    data.slots[slot].forEach(act=>{
      act.sites.forEach(site=>{
        site.guides.forEach(g=>{
          g.pax.forEach(p=>{
            html += `
              <div class="pax">
                <div class="pax-name">${p.firstName} ${p.lastName}</div>
                <div class="pax-equip">${p.equipment || ""}</div>
              </div>
            `;
          });
        });
      });
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

/* =========================
   INIT
========================= */
load();
setInterval(load, 60000);
setInterval(()=>location.reload(), 1000*60*30);

</script>

</body>
</html>
