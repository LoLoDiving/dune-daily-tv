<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>DAILY PACKAGES – TV</title>

<style>
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6f8;
  color:#111;
}

#root{
  height:100vh;
}

/* =========================
   🔥 LOADING OVERLAY (AJOUT)
========================= */
#loadingOverlay{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#f4f6f8,#eef2f5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loader-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.spinner{
  width:42px;
  height:42px;
  border-radius:50%;
  border:4px solid rgba(11,79,108,.15);
  border-top-color:#0b4f6c;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.loader-text{
  font-size:16px;
  font-weight:800;
  color:#0b4f6c;
}

/* =========================
   DEBUG VISUEL
========================= */
.debug-banner{
  position:fixed;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:6px 10px;
  font-weight:900;
  z-index:9999;
}
</style>
</head>

<body>

<!-- 🔥 DEBUG (tu peux le retirer après test) -->
<div class="debug-banner">TV VERSION</div>

<!-- 🔥 LOADER -->
<div id="loadingOverlay">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loader-text">Loading daily packages…</div>
  </div>
</div>

<div id="root"></div>

<script>

/* =========================
   CONFIG API
========================= */
const API = "https://script.google.com/macros/s/AKfycbxf4qR_wub5P5N3bnLlqu-y6hYiJExeRvoH4OtaisuLo9t4P2lmVoZjhMhRqGGpJG9NPA/exec";

/* =========================
   STATE
========================= */
let currentDate = new Date();
let isLoading = false;
let refreshTimer = null;
let reqSeq = 0;

const SLOT_ORDER = ["MORNING-1","MORNING-2","AFTERNOON"];

/* =========================
   HELPERS
========================= */
function toISO(d){ return d.toISOString().slice(0,10); }

function formatDate(d){
  return d.toLocaleDateString("en-GB",{
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* =========================
   LOADER CONTROL
========================= */
function showLoader(){
  document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loadingOverlay").style.display = "none";
}

/* =========================
   FETCH
========================= */
async function fetchDaily(dateISO){
  try{
    const res = await fetch(API + "?page=DATA_DAILY_PACKAGES&date=" + dateISO + "&t=" + Date.now());
    const txt = await res.text();
    return JSON.parse(txt);
  }catch(e){
    console.error("FETCH ERROR", e);
    return null;
  }
}

/* =========================
   LOAD
========================= */
async function loadDesktopDay(){

  if(isLoading) return;
  isLoading = true;

  showLoader(); // 🔥 IMPORTANT

  const base = new Date(currentDate);
  const d0 = toISO(base);

  const d1Date = new Date(base);
  d1Date.setDate(base.getDate()+1);
  const d1 = toISO(d1Date);

  const mySeq = ++reqSeq;

  const [dataJ, dataJ1] = await Promise.all([
    fetchDaily(d0),
    fetchDaily(d1)
  ]);

  if(mySeq !== reqSeq) return;

  if(!dataJ || !dataJ1){
    isLoading = false;
    return;
  }

  renderDesktop(dataJ, dataJ1);

  hideLoader(); // 🔥 IMPORTANT

  isLoading = false;

  scheduleAutoRefresh();
}

/* =========================
   AUTO REFRESH
========================= */
function scheduleAutoRefresh(){
  if(refreshTimer){
    clearTimeout(refreshTimer);
    refreshTimer = null;
  }

  refreshTimer = setTimeout(()=>{
    loadDesktopDay();
  },60000);
}

/* =========================
   RENDER
========================= */
function renderDesktop(dataJ, dataJ1){

  const root = document.getElementById("root");

  root.innerHTML = `
    <div>
      <h1 style="padding:10px;">${formatDate(new Date(dataJ.date))}</h1>
      <h1 style="padding:10px;">${formatDate(new Date(dataJ1.date))}</h1>
    </div>
  `;
}

/* =========================
   INIT
========================= */
loadDesktopDay();
setInterval(()=>location.reload(), 1000*60*30);

</script>

</body>
</html>
