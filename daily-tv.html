<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DAILY PACKAGES – TV</title>

<style>
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6f8;
  color:#111;
}
#root{
  height:100vh;
}

/* 🔥 TON CSS COMPLET ICI (NE RIEN MODIFIER) */
</style>
</head>

<body>

<div id="root"></div>

<script>

/* =========================
   CONFIG API
========================= */
const API = "https://script.google.com/macros/s/AKfycbxf4qR_wub5P5N3bnLlqu-y6hYiJExeRvoH4OtaisuLo9t4P2lmVoZjhMhRqGGpJG9NPA/exec";

/* =========================
   STATE
========================= */
let currentDate = new Date();
let isLoading = false;
let reqSeq = 0;

const SLOT_ORDER = ["MORNING-1","MORNING-2","AFTERNOON"];

/* =========================
   HELPERS
========================= */
function toISO(d){ return d.toISOString().slice(0,10); }

function formatDate(d){
  return d.toLocaleDateString("en-GB",{
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* =========================
   FETCH DATA (REMPLACE GAS)
========================= */
async function fetchDaily(dateISO){
  try{
    const res = await fetch(
      API + "?page=DATA_DAILY_PACKAGES&date=" + dateISO + "&t=" + Date.now()
    );
    const txt = await res.text();
    return JSON.parse(txt);
  }catch(e){
    console.error("FETCH ERROR", e);
    return null;
  }
}

/* =========================
   LOAD DESKTOP (IDENTIQUE)
========================= */
async function loadDesktopDay(){

  if(isLoading) return;
  isLoading = true;

  const base = new Date(currentDate);
  const d0 = toISO(base);

  const d1Date = new Date(base);
  d1Date.setDate(base.getDate()+1);
  const d1 = toISO(d1Date);

  const mySeq = ++reqSeq;

  const [dataJ, dataJ1] = await Promise.all([
    fetchDaily(d0),
    fetchDaily(d1)
  ]);

  if(mySeq !== reqSeq) return;

  if(!dataJ || !dataJ1){
    isLoading = false;
    return;
  }

  renderDesktop(dataJ, dataJ1);
  isLoading = false;
}

/* =========================
   RENDER DESKTOP (FULL)
========================= */
function renderDesktop(dataJ, dataJ1){

  const root = document.getElementById("root");

  root.innerHTML = `
    <div class="desktop-grid">

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ.date))}</h2>
        <div class="total total-mini" id="totalJ"></div>
        <div class="day-content" id="content"></div>
      </div>

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ1.date))}</h2>
        <div class="total total-mini" id="totalJ1"></div>
        <div class="day-content" id="contentJ1"></div>
      </div>

    </div>
  `;

  renderInto("content","totalJ",dataJ);
  renderInto("contentJ1","totalJ1",dataJ1);
}

/* =========================
   WRAPPER (IMPORTANT)
========================= */
function renderInto(contentId, totalId, data) {

  const targetContent = document.getElementById(contentId);
  const targetTotal   = document.getElementById(totalId);

  const originalGet = document.getElementById;

  document.getElementById = function(id) {
    if (id === "content") return targetContent;
    if (id === "totalLabel") return targetTotal;
    return originalGet.call(document, id);
  };

  render(data);

  document.getElementById = originalGet;
}

/* =========================
   🔥 TON RENDER ORIGINAL (SIMPLIFIÉ MIN)
========================= */
function render(data){

  const content = document.getElementById("content");
  const total   = document.getElementById("totalLabel");

  let html = "";
  let totalPax = 0;

  SLOT_ORDER.forEach(slot => {

    if (!data.slots?.[slot]) return;

    let paxCount = 0;

    data.slots[slot].forEach(act => {
      act.sites.forEach(site => {
        site.guides.forEach(g => {
          paxCount += g.pax.length;
        });
      });
    });

    totalPax += paxCount;

    html += `
      <div class="slot-header">
        <strong>${slot}</strong> — ${paxCount} pax
      </div>
      <div class="slot-content">
    `;

    data.slots[slot].forEach(act => {
      act.sites.forEach(site => {
        site.guides.forEach(g => {

          g.pax.forEach(p => {
            html += `
              <div class="pax">
                <div class="pax-name">${p.firstName} ${p.lastName}</div>
                <div class="pax-equip">${p.equipment || ""}</div>
              </div>
            `;
          });

        });
      });
    });

    html += `</div>`;
  });

  content.innerHTML = html;

  if(total){
    total.innerHTML = `<strong>${totalPax} Pax</strong>`;
  }
}

/* =========================
   AUTO REFRESH
========================= */
setInterval(loadDesktopDay, 60000);
setInterval(()=>location.reload(), 1000*60*10);

/* INIT */
loadDesktopDay();

</script>

</body>
</html>
