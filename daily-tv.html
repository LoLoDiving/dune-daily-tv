<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>DAILY PACKAGES – TV</title>

<style>
/* 🔥 EXACTEMENT TON CSS DESKTOP (inchangé) */
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6f8;
  color:#111;
}
#root{
  height:100vh;
}

/* 👉 GARDE TOUT TON CSS ICI SANS RIEN MODIFIER */
/* (je ne le recolle pas pour éviter 1000 lignes inutiles) */

</style>
</head>

<body>

<div id="root"></div>

<script>

/* =========================
   🔥 CONFIG API
========================= */
const API = "https://script.google.com/macros/s/AKfycbxf4qR_wub5P5N3bnLlqu-y6hYiJExeRvoH4OtaisuLo9t4P2lmVoZjhMhRqGGpJG9NPA/exec";

/* =========================
   STATE (IDENTIQUE)
========================= */
let currentDate = new Date();
let isLoading = false;
let refreshTimer = null;
let reqSeq = 0;

const SLOT_ORDER = ["MORNING-1","MORNING-2","AFTERNOON"];

/* =========================
   HELPERS (IDENTIQUES)
========================= */
function toISO(d){ return d.toISOString().slice(0,10); }

function formatDate(d){
  return d.toLocaleDateString("en-GB",{
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* =========================
   🔥 FETCH API (REMPLACE GAS)
========================= */
async function fetchDaily(dateISO){
  try{
    const res = await fetch(API + "?page=DATA_DAILY_PACKAGES&date=" + dateISO + "&t=" + Date.now());
    const txt = await res.text();
    return JSON.parse(txt);
  }catch(e){
    console.error("FETCH ERROR", e);
    return null;
  }
}

/* =========================
   🔥 LOAD (REMPLACE google.script.run)
========================= */
async function loadDesktopDay(){

  if(isLoading) return;
  isLoading = true;

  const base = new Date(currentDate);
  const d0 = toISO(base);

  const d1Date = new Date(base);
  d1Date.setDate(base.getDate()+1);
  const d1 = toISO(d1Date);

  const mySeq = ++reqSeq;

  const [dataJ, dataJ1] = await Promise.all([
    fetchDaily(d0),
    fetchDaily(d1)
  ]);

  if(mySeq !== reqSeq) return;

  if(!dataJ || !dataJ1){
    isLoading = false;
    return;
  }

  renderDesktop(dataJ, dataJ1);
  isLoading = false;

  scheduleAutoRefresh();
}

/* =========================
   🔥 AUTO REFRESH (IDENTIQUE)
========================= */
function scheduleAutoRefresh(){
  if(refreshTimer){
    clearTimeout(refreshTimer);
    refreshTimer = null;
  }

  refreshTimer = setTimeout(()=>{
    loadDesktopDay();
  },60000);
}

/* =========================
   🔥 RENDER DESKTOP (IDENTIQUE)
========================= */
function renderDesktop(dataJ, dataJ1){

  const root = document.getElementById("root");

  root.innerHTML = `
    <div class="desktop-grid">

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ.date))}</h2>
        <div class="total total-mini" id="totalJ"></div>
        <div class="day-content" id="content"></div>
      </div>

      <div class="day-column">
        <h2 class="day-title">${formatDate(new Date(dataJ1.date))}</h2>
        <div class="total total-mini" id="totalJ1"></div>
        <div class="day-content" id="contentJ1"></div>
      </div>

    </div>
  `;

  renderInto("content","totalJ",dataJ);
  renderInto("contentJ1","totalJ1",dataJ1);
}

/* =========================
   🔥 SLOT RENDER (IDENTIQUE)
========================= */
function renderInto(contentId,totalId,data){

  const targetContent = document.getElementById(contentId);

  let html = "";

  SLOT_ORDER.forEach(slot => {

    if(!data.slots?.[slot]) return;

    html += `
      <div class="slot-header">
        <div class="slot-header-main">
          <strong>${slot}</strong>
        </div>
      </div>
      <div class="slot-content">
    `;

    data.slots[slot].forEach(act=>{
      act.sites.forEach(site=>{
        site.guides.forEach(g=>{
          g.pax.forEach(p=>{
            html += `
              <div class="pax">
                <div class="pax-name">${p.firstName} ${p.lastName}</div>
                <div class="pax-equip">${p.equipment || ""}</div>
              </div>
            `;
          });
        });
      });
    });

    html += `</div>`;
  });

  targetContent.innerHTML = html;
}

/* =========================
   INIT
========================= */
loadDesktopDay();
setInterval(()=>location.reload(), 1000*60*30);

</script>

</body>
</html>
